[project]
name = "openfinch"
version = "0.1.0"
description = "OpenFinch Python SDK — self-hosted AI web agent infrastructure"
authors = [{ name = "OpenFinch" }]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
