name: Bug Report
description: Report a bug to help us improve
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run '...'
        2. Call endpoint '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant log output
      render: shell

  - type: input
    id: doctor
    attributes:
      label: Doctor Output
      description: Run `openfinch doctor` and paste the output
      placeholder: Paste openfinch doctor output here

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: How are you running OpenFinch?
      options:
        - Docker Compose
        - Local development (pnpm dev)
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      description: Your operating system
      placeholder: e.g., Windows 11, macOS 15, Ubuntu 24.04

  - type: input
    id: version
    attributes:
      label: OpenFinch Version
      description: What version are you running?
      placeholder: e.g., 0.1.0
